:root{
  --cyan:#00f0ff;
  --text:#e2e8f0;
  --sub:#94a3b8;
  --t1:#22c55e;
  --t2:#eab308;
  --t3:#ef4444;
}

*{
  -webkit-tap-highlight-color:transparent;
  box-sizing:border-box;
}

html,body{
  height:100%;
  margin:0;
  padding:0;
  font-family:sans-serif;
  color:#fff;
  overflow:hidden;
}

/* ═══════ BACKGROUND FIX UNTUK HP ═══════ */
body::before{
  content:"";
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background-image:url('bg.jpg');
  background-size:cover;
  background-position:center;
  background-repeat:no-repeat;
  z-index:-2;
}

/* Overlay gelap SANGAT TIPIS agar background terlihat jelas */
body::after{
  content:"";
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(2,6,23,0.15);
  z-index:-1;
}

.app{
  height:100vh;
  display:flex;
  flex-direction:column;
  position:relative;
  z-index:1;
}

/* ═══════ HEADER ═══════ */
.header{
  padding:10px 16px 6px;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  text-align:center;
  background:linear-gradient(180deg, rgba(2,6,23,0.60) 0%, rgba(2,6,23,0.10) 100%);
  border-bottom:1px solid rgba(0,240,255,0.10);
  flex-shrink:0;
  position:relative;
  z-index:2;
}

/* ═══════ LOGO (BISA GANTI BASE64) ═══════ */
.logo-wrap{
  width:56px;
  height:56px;
  border-radius:50%;
  border:2px solid rgba(0,240,255,0.4);
  display:flex;
  align-items:center;
  justify-content:center;
  overflow:hidden;
  background:rgba(2,6,23,0.30);
  margin:0 auto 6px auto;
  box-shadow:0 0 12px rgba(0,240,255,0.25),0 0 24px rgba(0,240,255,0.10),inset 0 0 12px rgba(0,240,255,0.08);
  animation:logoGlow 2s ease-in-out infinite;
}

@keyframes logoGlow{
  0%{box-shadow:0 0 12px rgba(0,240,255,0.25),0 0 24px rgba(0,240,255,0.10),inset 0 0 12px rgba(0,240,255,0.08);}
  50%{box-shadow:0 0 20px rgba(0,240,255,0.40),0 0 40px rgba(0,240,255,0.18),inset 0 0 20px rgba(0,240,255,0.12);}
  100%{box-shadow:0 0 12px rgba(0,240,255,0.25),0 0 24px rgba(0,240,255,0.10),inset 0 0 12px rgba(0,240,255,0.08);}
}

.logo-img{
  max-width:100%;
  max-height:100%;
  object-fit:contain;
  display:block;
  filter:drop-shadow(0 0 6px rgba(0,240,255,0.4));
}

.title-wrap{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:8px;
  margin:0 auto;
}

.title{
  font-size:20px;
  font-weight:bold;
  display:flex;
  align-items:center;
  justify-content:center;
  text-shadow:0 0 10px rgba(0,240,255,0.4), 0 2px 4px rgba(0,0,0,0.6);
  letter-spacing:1px;
}

.title .latin{
  font-family:'JujutsuCustom',sans-serif;
  color:#fff;
}

.title .jp{
  font-weight:900;
  margin-left:3px;
  color:var(--cyan);
  text-shadow:0 0 8px rgba(0,240,255,0.5);
}

.badge-wrap{
  display:flex;
  align-items:center;
  justify-content:center;
}

.badge{
  width:20px;
  height:20px;
  animation:pulse 1.5s infinite;
  display:block;
}

@keyframes pulse{
  0%{transform:scale(1);opacity:.7}
  50%{transform:scale(1.3);opacity:1}
  100%{transform:scale(1);opacity:.7}
}

.subtitle{
  font-size:11px;
  color:var(--sub);
  margin-top:4px;
  text-align:center;
  text-shadow:0 1px 3px rgba(0,0,0,0.6);
}

/* ═══════ NAV TABS ═══════ */
.nav-tabs{
  display:flex;
  gap:8px;
  padding:8px 10px;
  background:rgba(2,6,23,0.30);
  border-bottom:1px solid rgba(0,240,255,0.08);
  flex-shrink:0;
  position:relative;
  z-index:2;
}

.nav-tab{
  flex:1;
  padding:10px;
  border-radius:10px;
  border:1px solid rgba(0,240,255,0.12);
  background:rgba(2,6,23,0.25);
  color:var(--sub);
  font-size:13px;
  font-weight:bold;
  cursor:pointer;
  text-align:center;
  transition:.2s;
}

.nav-tab.active{
  background:linear-gradient(135deg, rgba(0,240,255,0.18), rgba(0,240,255,0.06));
  color:var(--cyan);
  border-color:var(--cyan);
  box-shadow:0 0 10px rgba(0,240,255,0.12), inset 0 0 6px rgba(0,240,255,0.04);
}

/* ═══════ CONTENT ═══════ */
.content{
  flex:1;
  display:flex;
  flex-direction:column;
  padding:8px;
  gap:8px;
  overflow:hidden;
  min-height:0;
  position:relative;
  z-index:2;
}

.tab-panel{
  display:none;
  flex:1;
  flex-direction:column;
  gap:8px;
  overflow:auto;
  min-height:0;
}

.tab-panel.active{
  display:flex;
}

/* ═══════ GLASS CARD - TANPA BACKDROP-FILTER (HP COMPATIBLE) ═══════ */
.glass-card{
  background:rgba(11,18,36,0.25);
  border:1px solid rgba(0,240,255,0.10);
  border-radius:14px;
  padding:10px;
  box-shadow:0 4px 15px rgba(0,0,0,0.2), inset 0 1px 0 rgba(255,255,255,0.03);
}

.form-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:8px;
}

.field{
  display:flex;
  flex-direction:column;
  gap:3px;
}

.full{grid-column:1/-1;}

label{
  font-size:10px;
  color:var(--sub);
  text-align:center;
  text-shadow:0 1px 2px rgba(0,0,0,0.4);
}

input,select{
  padding:8px;
  border-radius:10px;
  border:1px solid rgba(0,240,255,0.12);
  background:rgba(2,6,23,0.35);
  color:#fff;
  text-align:center;
  font-size:12px;
  outline:none;
}

input:focus,select:focus{
  border-color:var(--cyan);
  box-shadow:0 0 6px rgba(0,240,255,0.12);
}

/* ═══════ RESULT AREA ═══════ */
.result{
  flex:1;
  overflow:auto;
  background:rgba(11,18,36,0.22);
  border-radius:14px;
  padding:10px;
  border:1px solid rgba(0,240,255,0.08);
  box-shadow:0 4px 15px rgba(0,0,0,0.2), inset 0 1px 0 rgba(255,255,255,0.03);
}

.tier-row{
  display:flex;
  align-items:center;
  gap:8px;
  padding:5px 0;
}

.tier-label{
  width:28px;
  font-size:12px;
  font-weight:bold;
  color:var(--sub);
  flex-shrink:0;
}

.tier-progress-wrap{
  flex:1;
  min-width:0;
}

.progress{
  height:8px;
  background:rgba(0,0,0,0.25);
  border-radius:10px;
  overflow:hidden;
}

.bar{
  height:100%;
  width:0%;
  transition:.3s;
}

.bar.t1{background:var(--t1);}
.bar.t2{background:var(--t2);}
.bar.t3{background:var(--t3);}

.tier-info{
  width:90px;
  font-size:11px;
  text-align:right;
  color:var(--text);
  flex-shrink:0;
  white-space:nowrap;
}

.total-bar{
  height:8px;
  background:rgba(0,0,0,0.25);
  border-radius:20px;
  overflow:hidden;
}

.total-bar div{
  height:100%;
  background:linear-gradient(90deg, var(--cyan), #0088ff);
  width:0%;
  transition:.3s;
  box-shadow:0 0 5px rgba(0,240,255,0.3);
}

.summary-row{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:7px 0;
  font-size:12px;
  border-bottom:1px solid rgba(0,240,255,0.05);
}

.summary-label{
  color:var(--sub);
}

.summary-value{
  color:#fff;
  font-weight:bold;
}

/* ═══════ POWER BATTLE ═══════ */
.power-input{
  padding:12px;
  border-radius:10px;
  border:1px solid rgba(0,240,255,0.12);
  background:rgba(2,6,23,0.35);
  color:#fff;
  text-align:center;
  font-size:16px;
  width:100%;
  outline:none;
}

.power-input:focus{
  border-color:var(--cyan);
  box-shadow:0 0 8px rgba(0,240,255,0.12);
}

.power-btn{
  width:100%;
  padding:12px;
  border:none;
  border-radius:10px;
  background:linear-gradient(135deg, var(--cyan), #0088ff);
  color:#000;
  font-size:16px;
  font-weight:bold;
  cursor:pointer;
  transition:.2s;
  margin-top:8px;
}

.power-btn:hover{
  opacity:.85;
}

.power-result{
  background:rgba(11,18,36,0.25);
  border-radius:14px;
  padding:12px;
  border:1px solid rgba(0,240,255,0.10);
  margin-top:8px;
  display:none;
  box-shadow:0 4px 15px rgba(0,0,0,0.2), inset 0 1px 0 rgba(255,255,255,0.03);
}

.power-result.show{
  display:block;
}

.power-result h3{
  font-size:15px;
  margin:0 0 10px 0;
  color:var(--cyan);
  border-bottom:1px solid rgba(0,240,255,0.08);
  padding-bottom:8px;
  text-align:center;
}

.power-row{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:7px 0;
  font-size:13px;
  border-bottom:1px solid rgba(0,240,255,0.04);
}

.power-row:last-child{
  border-bottom:none;
}

.power-label{
  color:var(--sub);
}

.power-value{
  color:#fff;
  font-weight:bold;
  font-size:14px;
}

.power-highlight{
  color:var(--cyan);
  font-weight:bold;
  font-size:15px;
}

.power-section{
  margin-bottom:12px;
}

.power-section-title{
  font-size:11px;
  color:var(--sub);
  text-transform:uppercase;
  letter-spacing:1px;
  margin-bottom:6px;
}

/* ═══════ STORAGE SECTION - SELALU TAMPIL ═══════ */
.storage-section{
  background:rgba(11,18,36,0.85);
  border:2px solid rgba(0,240,255,0.25);
  border-radius:14px;
  padding:12px;
  margin-top:10px;
  box-shadow:0 4px 20px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.05);
  display:block !important;
  visibility:visible !important;
  opacity:1 !important;
}

.storage-title{
  font-size:13px;
  font-weight:bold;
  color:var(--cyan);
  text-align:center;
  margin-bottom:10px;
  text-transform:uppercase;
  letter-spacing:1px;
  text-shadow:0 0 8px rgba(0,240,255,0.3);
}

.storage-tier{
  display:flex;
  flex-direction:column;
  gap:6px;
  padding:10px 0;
  border-bottom:1px solid rgba(0,240,255,0.10);
}

.storage-tier:last-child{
  border-bottom:none;
}

.storage-tier-header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  flex-wrap:wrap;
  gap:4px;
}

.storage-tier-name{
  font-size:13px;
  font-weight:bold;
}

.storage-tier-name.t1{color:var(--t1);}
.storage-tier-name.t2{color:var(--t2);}
.storage-tier-name.t3{color:var(--t3);}

.storage-tier-limit{
  font-size:12px;
  color:var(--sub);
  font-weight:500;
}

.storage-progress-wrap{
  width:100%;
  height:8px;
  background:rgba(0,0,0,0.30);
  border-radius:10px;
  overflow:hidden;
  margin:4px 0;
}

.storage-progress-bar{
  height:100%;
  width:40%;
  transition:.3s;
  border-radius:10px;
}

.storage-progress-bar.t1{background:linear-gradient(90deg, var(--t1), #4ade80);}
.storage-progress-bar.t2{background:linear-gradient(90deg, var(--t2), #facc15);}
.storage-progress-bar.t3{background:linear-gradient(90deg, var(--t3), #f87171);}

.storage-details{
  display:flex;
  justify-content:space-between;
  font-size:12px;
  color:var(--sub);
  margin-top:2px;
}

.storage-time{
  font-size:14px;
  font-weight:bold;
  color:var(--cyan);
  text-align:center;
  margin-top:6px;
  padding:6px 0;
  background:rgba(0,240,255,0.08);
  border-radius:8px;
  border:1px solid rgba(0,240,255,0.15);
}

.storage-total-time{
  background:rgba(0,240,255,0.10);
  border-radius:12px;
  padding:12px;
  margin-top:10px;
  text-align:center;
  border:2px solid rgba(0,240,255,0.20);
}

.storage-total-time-label{
  font-size:12px;
  color:var(--sub);
  margin-bottom:4px;
}

.storage-total-time-value{
  font-size:18px;
  font-weight:bold;
  color:var(--cyan);
  text-shadow:0 0 10px rgba(0,240,255,0.3);
}

/* Hapus toggle button dan panel styles yang tidak diperlukan */
.toggle-storage-btn{display:none !important;}
.storage-panel{display:block !important;}

/* ═══════ INSTALL BUTTON ═══════ */
.install-btn{
  position:fixed;
  bottom:20px;
  right:20px;
  padding:12px 20px;
  border-radius:50px;
  border:none;
  background:linear-gradient(135deg, var(--cyan), #0088ff);
  color:#000;
  font-size:14px;
  font-weight:bold;
  cursor:pointer;
  box-shadow:0 4px 12px rgba(0,240,255,0.25);
  display:none;
  z-index:1000;
  animation:slideUp 0.3s ease;
}

.install-btn.show{
  display:block;
}

@keyframes slideUp{
  from{transform:translateY(100px);opacity:0;}
  to{transform:translateY(0);opacity:1;}
}

/* ═══════ SCROLLBAR ═══════ */
::-webkit-scrollbar{
  width:3px;
}

::-webkit-scrollbar-track{
  background:transparent;
}

::-webkit-scrollbar-thumb{
  background:rgba(0,240,255,0.12);
  border-radius:10px;
}
</style>
</head>

const installBtn = document.getElementById('installBtn');

window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  deferredPrompt = e;
  installBtn.classList.add('show');
});

function installPWA() {
  if (!deferredPrompt) return;
  deferredPrompt.prompt();
  deferredPrompt.userChoice.then((choiceResult) => {
    if (choiceResult.outcome === 'accepted') installBtn.classList.remove('show');
    deferredPrompt = null;
  });
}

window.addEventListener('appinstalled', () => {
  installBtn.classList.remove('show');
  deferredPrompt = null;
});

function num(v){
  v=String(v||"").trim();
  if(v==="")return 0;
  return parseFloat(v.replace(/\./g,"").replace(",","."));
}
function spd(v){
  v=String(v||"").trim();
  if(v==="")return 1;
  return parseFloat(v.replace(",","."));
}

function waktu(d){
  if(!isFinite(d) || d <= 0) return "0d";
  let ts = Math.ceil(d);
  let h  = Math.floor(ts / 3600);
  let m  = Math.floor((ts % 3600) / 60);
  let s  = ts % 60;
  let parts = [];
  if(h > 0) parts.push(h + "j");
  if(m > 0) parts.push(m + "m");
  if(s > 0 || (h === 0 && m === 0)) parts.push(s + "d");
  return parts.join(" ") || "0d";
}

function hitungExp(){
  let totalExp = num(expNow.value) + num(expMissing.value) + (num(jumlahBuku.value) * num(expBuku.value));
  let o = lvl.options[lvl.selectedIndex];
  let T1 = Number(o.dataset.t1 || 0);
  let T2 = Number(o.dataset.t2 || 0);
  let T3 = Number(o.dataset.t3 || 0);

  let e1=0, e2=0, e3=0, sisa=totalExp;

  if(tier.value == "t1"){
    e1 = Math.min(sisa, T1); sisa -= e1;
    e2 = Math.min(sisa, T2); sisa -= e2;
    e3 = Math.min(sisa, T3);
  }
  if(tier.value == "t2"){
    e1 = T1;
    e2 = Math.min(sisa, T2); sisa -= e2;
    e3 = Math.min(sisa, T3);
  }
  if(tier.value == "t3"){
    e1 = T1; e2 = T2;
    e3 = Math.min(sisa, T3);
  }

  let p1 = T1 ? (e1/T1)*100 : 0;
  let p2 = T2 ? (e2/T2)*100 : 0;
  let p3 = T3 ? (e3/T3)*100 : 0;

  let sp = spd(speed.value);
  if(sp <= 0) sp = 1;

  let s1 = Math.max(T1 - e1, 0);
  let s2 = Math.max(T2 - e2, 0);
  let s3 = Math.max(T3 - e3, 0);

  let w1 = s1 / sp;
  let w2 = s2 / sp;
  let w3 = s3 / sp;
  let totalDetik = w1 + w2 + w3;

  let totalMax = T1 + T2 + T3;
  let totalProgress = totalMax ? ((e1 + e2 + e3) / totalMax) * 100 : 0;
  bar.style.width = totalProgress + "%";

  let zonaOffset = parseInt(zona.value);
  let tz = zonaOffset === 7 ? 'Asia/Jakarta' : zonaOffset === 8 ? 'Asia/Makassar' : 'Asia/Jayapura';
  let now = new Date();
  let selesai = new Date(now.getTime() + totalDetik * 1000);

  let waktuSelesaiStr = "-";
  if(totalDetik > 0){
    waktuSelesaiStr = selesai.toLocaleString("id-ID", {
      timeZone: tz,
      weekday: 'short', year: 'numeric', month: 'short', day: 'numeric',
      hour: '2-digit', minute: '2-digit', second: '2-digit'
    });
  }

  hasil.innerHTML = `
    <div class="summary-row">
      <span class="summary-label">Total Exp</span>
      <span class="summary-value">${Math.floor(totalExp).toLocaleString('id-ID')}</span>
    </div>
    <div class="tier-row">
      <span class="tier-label" style="color:var(--t1)">T1</span>
      <div class="tier-progress-wrap"><div class="progress"><div class="bar t1" style="width:${p1}%"></div></div></div>
      <span class="tier-info">${Math.floor(e1).toLocaleString('id-ID')} / ${Math.floor(T1).toLocaleString('id-ID')}</span>
    </div>
    <div style="display:flex;justify-content:space-between;font-size:11px;color:var(--sub);padding:0 0 6px 36px;">
      <span>Sisa: ${Math.floor(s1).toLocaleString('id-ID')}</span><span>${waktu(w1)}</span>
    </div>
    <div class="tier-row">
      <span class="tier-label" style="color:var(--t2)">T2</span>
      <div class="tier-progress-wrap"><div class="progress"><div class="bar t2" style="width:${p2}%"></div></div></div>
      <span class="tier-info">${Math.floor(e2).toLocaleString('id-ID')} / ${Math.floor(T2).toLocaleString('id-ID')}</span>
    </div>
    <div style="display:flex;justify-content:space-between;font-size:11px;color:var(--sub);padding:0 0 6px 36px;">
      <span>Sisa: ${Math.floor(s2).toLocaleString('id-ID')}</span><span>${waktu(w2)}</span>
    </div>
    <div class="tier-row">
      <span class="tier-label" style="color:var(--t3)">T3</span>
      <div class="tier-progress-wrap"><div class="progress"><div class="bar t3" style="width:${p3}%"></div></div></div>
      <span class="tier-info">${Math.floor(e3).toLocaleString('id-ID')} / ${Math.floor(T3).toLocaleString('id-ID')}</span>
    </div>
    <div style="display:flex;justify-content:space-between;font-size:11px;color:var(--sub);padding:0 0 6px 36px;">
      <span>Sisa: ${Math.floor(s3).toLocaleString('id-ID')}</span><span>${waktu(w3)}</span>
    </div>
    <div class="summary-row">
      <span class="summary-label">Total Waktu</span>
      <span class="summary-value">${waktu(totalDetik)}</span>
    </div>
    <div class="summary-row">
      <span class="summary-label">Estimasi Selesai</span>
      <span class="summary-value" style="font-size:11px;">${waktuSelesaiStr}</span>
    </div>
    <div class="summary-row" style="border-bottom:none;">
      <span class="summary-label">Progress Total</span>
      <span class="summary-value">${totalProgress.toFixed(2)}%</span>
    </div>
  `;

  hitungStorage();
}

function hitungStorage(){
  let o = lvl.options[lvl.selectedIndex];
  let T1 = Number(o.dataset.t1 || 0);
  let T2 = Number(o.dataset.t2 || 0);
  let T3 = Number(o.dataset.t3 || 0);
  let sp = spd(speed.value);
  if(sp <= 0) sp = 1;

  let limitT1 = Math.floor(T1 * 0.40);
  let limitT2 = Math.floor(T2 * 0.40);
  let limitT3 = Math.floor(T3 * 0.40);

  let timeT1 = limitT1 / sp;
  let timeT2 = limitT2 / sp;
  let timeT3 = limitT3 / sp;
  let totalTime = timeT1 + timeT2 + timeT3;

  const content = document.getElementById('storageContent');
  content.innerHTML = '';

  const tiers = [
    {name: '📗 Tier 1 (T1)', cls: 't1', limit: limitT1, total: T1, time: timeT1},
    {name: '📙 Tier 2 (T2)', cls: 't2', limit: limitT2, total: T2, time: timeT2},
    {name: '📕 Tier 3 (T3)', cls: 't3', limit: limitT3, total: T3, time: timeT3}
  ];

  tiers.forEach(tier => {
    const tierDiv = document.createElement('div');
    tierDiv.className = 'storage-tier';
    tierDiv.innerHTML = `
      <div class="storage-tier-header">
        <span class="storage-tier-name ${tier.cls}">${tier.name}</span>
        <span class="storage-tier-limit">Limit: ${tier.limit.toLocaleString('id-ID')} / ${tier.total.toLocaleString('id-ID')} EXP</span>
      </div>
      <div class="storage-progress-wrap">
        <div class="storage-progress-bar ${tier.cls}" style="width:40%"></div>
      </div>
      <div class="storage-details">
        <span>40% dari ${tier.total.toLocaleString('id-ID')}</span>
        <span>Speed: ${sp}/detik</span>
      </div>
      <div class="storage-time">⏱️ ${waktu(tier.time)}</div>
    `;
    content.appendChild(tierDiv);
  });

  document.getElementById('storageTotalTime').innerText = waktu(totalTime);
}

function formatAngka(angka){
  return Math.floor(angka).toLocaleString('id-ID');
}

function hitungPower(){
  let powerSaya = parseFloat(document.getElementById("powerSaya").value);
  let levelSaya = parseInt(document.getElementById("lvlPower").value);

  if(isNaN(powerSaya) || powerSaya <= 0){
    document.getElementById("powerHasil").classList.remove("show");
    return;
  }

  let multiplierAnda = (levelSaya >= 15) ? 1.10 : 1.05;

  let playerMin = (powerSaya * 0.95) / 1.05;
  let playerAman = playerMin * 1.01;

  let playerMax = (powerSaya * multiplierAnda) / 0.95;
  let playerAmanDiAtk = playerMax * 0.99;

  document.getElementById("playerMin").innerText = formatAngka(playerMin);
  document.getElementById("playerAman").innerText = formatAngka(playerAman);
  document.getElementById("playerMax").innerText = formatAngka(playerMax);
  document.getElementById("playerAmanDiAtk").innerText = formatAngka(playerAmanDiAtk);

  document.getElementById("powerHasil").classList.add("show");
}

document.querySelectorAll("#panel-power input,#panel-power select").forEach(e=>{
